<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saahel — Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Raleway', sans-serif;
            min-height: 100vh;
            background: linear-gradient(170deg,
                #010810 0%,
                #021428 15%,
                #062550 30%,
                #0D47A1 50%,
                #1976D2 65%,
                #29B6F6 82%,
                #81D4FA 100%
            );
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* Cercles lumineux */
        .glow { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; }
        .glow1 { width: 600px; height: 600px; background: rgba(13,71,161,0.4); top: -150px; left: -150px; }
        .glow2 { width: 500px; height: 500px; background: rgba(41,182,246,0.3); bottom: -100px; right: -100px; }
        .glow3 { width: 350px; height: 350px; background: rgba(129,212,250,0.2); top: 50%; left: 50%; transform: translate(-50%,-50%); }

        /* Lune */
        .moon {
            position: fixed; top: 6%; right: 9%;
            width: 65px; height: 65px;
            background: radial-gradient(circle at 35% 35%, #FFF8D0, #F0C040 60%, #C8960A 100%);
            border-radius: 50%; z-index: 1;
            animation: moonGlow 4s ease-in-out infinite;
        }
        @keyframes moonGlow {
            0%, 100% { box-shadow: 0 0 25px 10px rgba(240,192,64,0.5), 0 0 70px 25px rgba(240,192,64,0.2); }
            50% { box-shadow: 0 0 40px 15px rgba(255,224,80,0.7), 0 0 100px 40px rgba(240,192,64,0.3); }
        }

        /* Dunes */
        .dunes { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1; pointer-events: none; }
        .dune { position: absolute; bottom: 0; border-radius: 50%; }
        .dune1 { width: 130%; left: -15%; height: 150px; background: linear-gradient(180deg, rgba(1,8,16,0.5), rgba(1,8,16,0.9)); }
        .dune2 { width: 110%; left: -5%; height: 95px; background: linear-gradient(180deg, rgba(2,20,40,0.5), rgba(2,20,40,0.85)); }
        .dune3 { width: 90%; left: 5%; height: 58px; background: rgba(6,37,80,0.5); }

        /* CARTE */
        .login-container { position: relative; z-index: 10; width: 100%; max-width: 420px; padding: 20px; animation: fadeInUp 0.6s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .login-card {
            background: rgba(1,8,16,0.75);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(41,182,246,0.3);
            border-radius: 24px; padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(129,212,250,0.12);
        }

        .logo-section { text-align: center; margin-bottom: 35px; }
        .logo-circle {
            width: 75px; height: 75px;
            background: linear-gradient(135deg, #1565C0, #29B6F6);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; margin: 0 auto 15px;
            animation: logoGlow 3s ease-in-out infinite;
        }
        @keyframes logoGlow {
            0%, 100% { box-shadow: 0 0 25px rgba(41,182,246,0.6), 0 0 50px rgba(41,182,246,0.2); }
            50% { box-shadow: 0 0 50px rgba(129,212,250,0.9), 0 0 100px rgba(41,182,246,0.5); }
        }

        .brand-name { font-family: 'Cinzel', serif; font-size: 2.2rem; font-weight: 700; color: #81D4FA; letter-spacing: 6px; text-shadow: 0 0 20px rgba(129,212,250,0.8), 0 0 40px rgba(41,182,246,0.5); }
        .brand-subtitle { color: rgba(129,212,250,0.5); font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; color: rgba(129,212,250,0.75); font-size: 0.82rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 12px 18px; background: rgba(2,14,28,0.85); border: 1.5px solid rgba(41,182,246,0.25); border-radius: 12px; color: #CEE9FF; font-family: 'Raleway', sans-serif; font-size: 0.95rem; transition: all 0.3s; outline: none; }
        .form-input::placeholder { color: rgba(129,212,250,0.25); }
        .form-input:focus { border-color: #29B6F6; background: rgba(6,37,80,0.9); box-shadow: 0 0 0 3px rgba(41,182,246,0.2); color: #F0FAFF; }

        .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, #1565C0, #29B6F6); color: white; border: none; border-radius: 12px; font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 700; letter-spacing: 2px; cursor: pointer; transition: all 0.3s; margin-top: 10px; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(41,182,246,0.6); }

        .alert-danger { background: rgba(60,13,13,0.5); border: 1px solid rgba(239,154,154,0.3); border-left: 3px solid #EF5350; border-radius: 10px; padding: 10px 15px; color: #EF9A9A; font-size: 0.87rem; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="glow glow1"></div>
    <div class="glow glow2"></div>
    <div class="glow glow3"></div>
    <div class="moon"></div>
    <div class="dunes">
        <div class="dune dune1"></div>
        <div class="dune dune2"></div>
        <div class="dune dune3"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-circle">🌙</div>
                <div class="brand-name">SAAHEL</div>
                <div class="brand-subtitle">Gestion de Stock</div>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert-danger">⚠️ {{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label class="form-label">Identifiant</label>
                    <input type="text" name="username" class="form-input" placeholder="admin" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">ENTRER</button>
            </form>
        </div>
    </div>
</body>
</html>

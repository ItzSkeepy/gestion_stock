<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ article[1] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow col-md-6 mx-auto">
        {% if article[5] %}
            <img src="/static/uploads/{{ article[5] }}" class="card-img-top" style="max-height:300px; object-fit:cover;">
        {% endif %}
        <div class="card-body">
            <h3 class="card-title">{{ article[1] }}</h3>
            <p class="card-text text-muted">{{ article[2] }}</p>
            <h4 class="text-success">💰 {{ article[3] }} FCFA</h4>
            <p>
                Stock disponible :
                {% if article[4] <= 5 %}
                    <span class="badge bg-danger">{{ article[4] }} ⚠️ Stock bas</span>
                {% else %}
                    <span class="badge bg-success">{{ article[4] }}</span>
                {% endif %}
            </p>

            <hr>
            <h5>Enregistrer une vente</h5>
            <form method="POST" action="/vendre/{{ article[0] }}">
                <div class="mb-3">
                    <label class="form-label">Quantité vendue</label>
                    <input type="number" name="quantite" class="form-control" min="1" max="{{ article[4] }}" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">✅ Valider la vente</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>

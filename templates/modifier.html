{% extends 'base.html' %}
{% block content %}
<h2 class="page-title">✏️ Modifier un article</h2>

<div class="card-saahel p-4" style="max-width:600px;">
    <form method="POST" class="form-saahel">
        <div class="mb-3">
            <label class="form-label">Nom de l'article</label>
            <input type="text" name="nom" class="form-control" value="{{ article[1] }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="3">{{ article[2] }}</textarea>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Prix (FCFA)</label>
                <input type="number" name="prix" step="0.01" class="form-control" value="{{ article[3] }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Stock</label>
                <input type="number" name="stock" class="form-control" value="{{ article[4] }}" required>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label">Catégorie</label>
            <select name="categorie_id" class="form-control">
                <option value="">— Sans catégorie —</option>
                {% for cat in categories %}
                    <option value="{{ cat[0] }}" {% if article[8] == cat[0] %}selected{% endif %}>{{ cat[1] }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="d-flex gap-3">
            <button type="submit" class="btn-saahel-primary">💾 Enregistrer</button>
            <a href="/" class="btn-saahel-secondary">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
